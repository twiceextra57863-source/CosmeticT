name: Build TButton Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Build
        run: gradle build
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tbuttonmod
          path: build/libs/*.jar
