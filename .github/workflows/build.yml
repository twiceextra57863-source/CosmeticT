name: Build TButton Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            
      - name: Make gradlew executable
        run: chmod +x gradlew
        
      - name: Clean previous builds
        run: rm -rf build .gradle
        
      - name: Build with Gradle
        run: ./gradlew build --stacktrace --refresh-dependencies
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false
          
      - name: List build output
        run: |
          ls -la build/libs/
          echo "Build files:"
          find build/libs -type f -name "*.jar" | xargs -I {} basename {}
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TButtonMod-1.21-fabric-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          
      - name: Get Version
        id: version
        run: echo "version=$(grep 'mod_version' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT
